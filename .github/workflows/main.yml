name: Build VPK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build StreamFlix Vita VPK
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apk add --no-cache cmake make git bash

      - name: Install vita libraries
        run: |
          vdpm curl
          vdpm jansson
          vdpm openssl
          vdpm zlib
          vdpm libvita2d
          vdpm freetype
          vdpm libpng
          vdpm libjpeg-turbo



      - name: Debug - List files
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== Looking for CMakeLists.txt ==="
          find . -name "CMakeLists.txt" -maxdepth 3

      - name: Configure
        run: |
          # Find where CMakeLists.txt is
          if [ -f "vita/CMakeLists.txt" ]; then
            cd vita
          elif [ -f "CMakeLists.txt" ]; then
            echo "CMakeLists.txt in root"
          else
            echo "ERROR: CMakeLists.txt not found!"
            exit 1
          fi
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake

      - name: Build
        run: |
          if [ -d "vita/build" ]; then
            cd vita/build
          elif [ -d "build" ]; then
            cd build
          fi
          make -j$(nproc) 2>&1 || {
            echo "=== Build failed, checking relocations ==="
            arm-vita-eabi-readelf -r streamflix-vita 2>/dev/null | grep -E "R_ARM.*(25|43|44)" | head -20 || true
            echo "=== Checking which .o files have type 25 ==="
            for f in CMakeFiles/streamflix-vita.dir/src/**/*.obj; do
              if arm-vita-eabi-readelf -r "$f" 2>/dev/null | grep -q "00019"; then
                echo "PROBLEMATIC: $f"
              fi
            done
            exit 1
          }

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamflix-vita-vpk
          path: |
            **/build/*.vpk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/build/*.vpk
          generate_release_notes: true
