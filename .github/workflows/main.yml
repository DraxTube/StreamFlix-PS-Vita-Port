name: Build VPK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build StreamFlix Vita VPK
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apk add --no-cache cmake make git bash

      - name: Install vita libraries
        run: |
          vdpm curl
          vdpm jansson
          vdpm openssl
          vdpm zlib
          vdpm libvita2d
          vdpm freetype
          vdpm libpng
          vdpm libjpeg-turbo



      - name: Debug - List files
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== Looking for CMakeLists.txt ==="
          find . -name "CMakeLists.txt" -maxdepth 3

      - name: Configure
        run: |
          # Find where CMakeLists.txt is
          if [ -f "vita/CMakeLists.txt" ]; then
            cd vita
          elif [ -f "CMakeLists.txt" ]; then
            echo "CMakeLists.txt in root"
          else
            echo "ERROR: CMakeLists.txt not found!"
            exit 1
          fi
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake

      - name: Build ELF patcher
        run: |
          gcc -o /tmp/patch_relocs vita/tools/patch_relocs.c

      - name: Build
        run: |
          cd vita/build
          # Build just the ELF target (will succeed)
          make streamflix-vita -j$(nproc)
          echo "=== ELF linked successfully ==="
          # Patch unsupported R_ARM_GOTPC relocations
          /tmp/patch_relocs streamflix-vita
          # Now run the remaining vita steps manually
          make -j$(nproc) 2>&1 || {
            echo "=== Retrying vita-elf-create after patch ==="
            vita-elf-create streamflix-vita streamflix-vita.velf
            vita-make-fself -a streamflix-vita.velf eboot.bin
            vita-mksfoex -d PARENTAL_LEVEL=1 -s TITLE_ID=STFX00001 "StreamFlix" param.sfo
            vita-pack-vpk -s param.sfo -b eboot.bin \
              -a ../sce_sys/livearea/contents/template.xml=sce_sys/livearea/contents/template.xml \
              streamflix-vita.vpk
          }

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamflix-vita-vpk
          path: |
            **/build/*.vpk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/build/*.vpk
          generate_release_notes: true
